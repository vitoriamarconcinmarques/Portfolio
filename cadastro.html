<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Cadastro de Usuário</h1>
</header>

<nav>
    <ul>
        <li><a href="index.html" aria-label="Voltar para página inicial">Início</a></li>
        <li><a href="cadastro.html" aria-label="Ir novamente ao cadastro">Cadastro</a></li>
    </ul>
</nav>

<main>
    <section>
        <article>
            <h2>Preencha corretamente</h2>

            <form id="formCadastro">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" required>

                <label for="email">Email:</label>
                <input type="email" id="email" required>

                <label for="idade">Idade:</label>
                <input type="number" id="idade" required>

                <button type="button" onclick="enviarFormulario()">Enviar</button>
            </form>

            <p id="mensagem"></p>
        </article>
    </section>
</main>

<footer>
    <p>Trabalho de desenvolvimento web</p>
</footer>

<script src="script.js"></script>

</body>
</html>
